<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Adoção de Animais</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="cadastroadotantes.js" defer></script>
</head>

<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <i class="fas fa-paw"></i>
        <h1>Conecta Patas</h1>
      </div>
      <!--Filtro pesquisa-->
      <div class="search-bar">
        <input type="text" id="search-ongs" placeholder="Buscar ONGs por cidade...">
        <button id="btn-search"><i class="fas fa-search"></i></button>
      </div>
      <!--Menu -->
      <nav>
        <ul class="nav-menu" id="nav-menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="animais.html">Animais</a></li>
          <li><a href="ongs.html">ONGs</a></li>
          <li><a href="contato.html">Contato</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          </li>
          <li class="auth-buttons">
            <a href="login.html" class="btn-login">Entrar</a>
            <a href="cadastro_usuario.html" class="btn-cadastro">Cadastrar</a>
          </li>
        </ul>
      </nav>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <div class="container">
    <h2>Cadastro de Adotantes</h2>
    <form id="adotantesForm">
      <label for="nomeAdotante">Nome Completo:</label>
      <input type="text" id="nomeAdotante" name="nome" required>

      <label for="emailAdotante">E-mail:</label>
      <input type="email" id="emailAdotante" name="email" required>

      <label for="telefoneAdotante">Telefone:</label>
      <input type="tel" id="telefoneAdotante" name="telefone" required>

      <label for="enderecoAdotante">Endereço:</label>
      <input type="enderecoAdotante" id="enderecoAdotante" name="endereco" required>

      <label for="cidadeAdotante">Cidade:</label>
      <input type="text" id="cidadeAdotante" name="cidade" required>

      <label for="estadoAdotante">Estado:</label>
      <select id="estadoAdotante" name="estado" required>
        <option value="">Selecione...</option>
        <option value="RS">RS</option>
        <option value="SP">SC</option>
        <option value="RJ">PR</option>
        <option value="MG">SP</option>
      </select>

      <label for="tipoPetAdotante">Preferência de Pet:</label>
      <select id="tipoPetAdotante" name="tipoPet" required>
        <option value="">Selecione...</option>
        <option value="cachorro">Cachorro</option>
        <option value="gato">Gato</option>
        <option value="outros">Outros</option>
      </select>

      <label for="experienciaAdotante">Experiência com Pets:</label>
      <textarea id="experienciaAdotante" name="experiencia" rows="3" required></textarea>

      <label for="moradiaAdotante">Tipo de Moradia:</label>
      <select id="moradiaAdotante" name="moradia" required>
        <option value="">Selecione...</option>
        <option value="casa">Casa</option>
        <option value="apartamento">Apartamento</option>
        <option value="chacara">Chácara/Sítio</option>
      </select>

      <label for="espacoAdotante">Espaço disponível para o pet:</label>
      <input type="text" id="espacoAdotante" name="espaco" required>

      <label for="motivacao">Motivação para adoção:</label>
      <textarea id="motivacao" name="motivacao" rows="4" required></textarea>

      <button type="submit">Cadastrar Adotante</button>
      <p id="mensagemAdotantes" class="error"></p>
    </form>
  </div>

  <footer>
    <p>&copy; 2026 - Sistema de Adoção de Animais. Todos os direitos reservados.</p>
  </footer>
</body>

</html>
