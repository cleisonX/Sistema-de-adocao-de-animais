<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Adoção de Animais</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="cadastroanimais.js" defer></script>
</head>

<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <i class="fas fa-paw"></i>
        <h1>Conecta Patas</h1>
      </div>
       <!--Filtro pesquisa-->
      <div class="search-bar">
        <input type="text" id="search-ongs" placeholder="Buscar ONGs por cidade...">
        <button id="btn-search"><i class="fas fa-search"></i></button>
      </div>
       <!--Menu -->
      <nav>
        <ul class="nav-menu" id="nav-menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="animais.html">Animais</a></li>
          <li><a href="ongs.html">ONGs</a></li>
          <li><a href="contato.html">Contato</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          </li>
          <li class="auth-buttons">
            <a href="login.html" class="btn-login">Entrar</a>
            <a href="cadastro_usuario.html" class="btn-cadastro">Cadastrar</a>
          </li>
        </ul>
      </nav>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <div class="container">
    <h2>Cadastro de Animais</h2>
    <form id="animaisForm">
      <label for="nomeAnimal">Nome do Animal:</label>
      <input type="text" id="nomeAnimal" name="nomeAnimal" required>

      <label for="especie">Espécie:</label>
      <select id="especie" name="especie" required>
        <option value="">Selecione...</option>
        <option value="cachorro">Cachorro</option>
        <option value="gato">Gato</option>
        <option value="outros">Outros</option>
      </select>

      <label for="raca">Raça:</label>
      <input type="text" id="raca" name="raca">

      <label for="idade">Idade (em anos):</label>
      <input type="number" id="idade" name="idade" min="0" required>

      <label for="sexo">Sexo:</label>
      <select id="sexo" name="sexo" required>
        <option value="">Selecione...</option>
        <option value="macho">Macho</option>
        <option value="femea">Fêmea</option>
      </select>

      <label for="porte">Porte:</label>
      <select id="porte" name="porte" required>
        <option value="">Selecione...</option>
        <option value="pequeno">Pequeno</option>
        <option value="medio">Médio</option>
        <option value="grande">Grande</option>
      </select>

      <label for="saude">Condições de Saúde:</label>
      <textarea id="saude" name="saude" rows="3" placeholder="Vacinas, castração, tratamentos, etc."
        required></textarea>

      <label for="comportamento">Comportamento:</label>
      <textarea id="comportamento" name="comportamento" rows="3" placeholder="Ex: dócil, brincalhão, tímido"
        required></textarea>

      <label for="fotoAnimal">Fotos do Animal:</label>
      <input type="file" id="fotoAnimal" name="foto" accept="image/*" multiple required>

      <button type="submit">Cadastrar Animal</button>
      <p id="mensagemAnimais" class="error"></p>
    </form>
  </div>

  <footer>
    <p>&copy; 2026 - Sistema de Adoção de Animais. Todos os direitos reservados.</p>
  </footer>
  <script src="script.js"></script>
</body>

</html>
